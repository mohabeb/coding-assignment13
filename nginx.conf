server {
    listen 8018;
    listen [::]:8018;
    server_name _;

    root /Habeeb_Mohamed_ui_garden_build_checks;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
