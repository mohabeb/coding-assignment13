name: Code Quality and Production Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  quality-and-build:
    name: Prettier, ESLint, Tests, Build, and Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CI: true
      HUSKY: 0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Run tests once
        run: npm run test:ci

      - name: Create production build
        run: npm run build

      - name: Build Docker image
        run: docker build -t habeeb_mohamed_coding_assignment13 .
